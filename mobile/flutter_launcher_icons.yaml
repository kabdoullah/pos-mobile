flutter_launcher_icons:
  # iOS — fond opaque obligatoire (pas de transparence acceptée par App Store)
  ios: true
  image_path_ios: assets/launcher_icons/icon_ios.png
  remove_alpha_ios: true

  # Android — icône adaptative (foreground + background)
  android: true
  min_sdk_android: 21
  # Fallback pour Android < API 26 (non-adaptive)
  image_path_android: assets/launcher_icons/icon_android_legacy.png
  # Dark foreground (gold ring + ivoire) sur fond cacao — contraste fort à petite taille
  adaptive_icon_foreground: assets/launcher_icons/icon_android_fg_dark.png
  adaptive_icon_background: "#92400E"

  # Android dark mode (API 33+)
  adaptive_icon_foreground_dark: assets/launcher_icons/icon_android_fg_dark.png
  adaptive_icon_background_dark: "#1C1107"

  # Web désactivé — app mobile uniquement
  web:
    generate: false
