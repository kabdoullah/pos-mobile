<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Feuille cacaoyer (cacao) -->
  <path d="M100 22 C72 22 42 50 38 85 C34 118 50 152 74 163 C82 167 91 170 100 170
           C109 170 118 167 126 163 C150 152 166 118 162 85 C158 50 128 22 100 22 Z"
        fill="#92400E"/>
  <!-- Nervure centrale (or) -->
  <line x1="100" y1="34" x2="100" y2="158" stroke="#CA8A04" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Nervures gauches -->
  <line x1="100" y1="68"  x2="62"  y2="86"  stroke="#CA8A04" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <line x1="100" y1="92"  x2="52"  y2="110" stroke="#CA8A04" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <line x1="100" y1="116" x2="60"  y2="132" stroke="#CA8A04" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <!-- Nervures droites -->
  <line x1="100" y1="68"  x2="138" y2="86"  stroke="#CA8A04" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <line x1="100" y1="92"  x2="148" y2="110" stroke="#CA8A04" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <line x1="100" y1="116" x2="140" y2="132" stroke="#CA8A04" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <!-- Sac commerçant (ivoire) centré -->
  <rect x="70" y="88" width="60" height="52" rx="9" fill="#FFFBF5"/>
  <!-- Anse du sac -->
  <path d="M82 88 Q82 70 100 70 Q118 70 118 88"
        fill="none" stroke="#FFFBF5" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Trait décoratif or sur le sac -->
  <line x1="78" y1="114" x2="122" y2="114" stroke="#CA8A04" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
  <!-- Petit point accent -->
  <circle cx="100" cy="103" r="4" fill="#CA8A04" opacity="0.5"/>
</svg>
