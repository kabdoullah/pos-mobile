# =============================================================================
# Workflow de déploiement en production
# =============================================================================
#
# STATUT : DÉSACTIVÉ pour le moment (toutes les sections sont en commentaire).
#
# Ce workflow est conçu pour déployer le backend sur un VPS via SSH une fois
# que tu auras :
#   1. Provisionné un VPS (Hetzner CPX11 recommandé, voir docs/adr/0006-*.md)
#   2. Suivi le runbook de setup initial (docs/runbook.md)
#   3. Configuré les secrets GitHub (voir section "Secrets requis" ci-dessous)
#
# Pour ACTIVER ce workflow le jour où tu seras prêt :
#   1. Décommenter tout le bloc "on:" et "jobs:" ci-dessous (retirer les # devant)
#   2. Configurer les secrets GitHub dans Settings > Secrets and variables > Actions :
#      - VPS_HOST          : IP ou DNS du VPS
#      - VPS_USER          : utilisateur SSH (ex: pos)
#      - VPS_SSH_KEY       : clé privée SSH (format ed25519 ou rsa)
#      - VPS_DEPLOY_PATH   : chemin du repo sur le VPS (ex: /home/pos/pos-mobile-ci)
#   3. Tester avec un déploiement manuel (workflow_dispatch) avant d'activer
#      le déclenchement automatique sur push de tag
#
# =============================================================================

name: Deploy to production

# DÉSACTIVÉ : tout le contenu fonctionnel est en commentaire ci-dessous.
# Pour réactiver, retirer le bloc "on" minimal et décommenter les vraies sections.
on:
  workflow_dispatch:
    inputs:
      placeholder:
        description: "Workflow non actif. Voir le commentaire en tête du fichier."
        required: false
        default: "disabled"

jobs:
  noop:
    name: Workflow disabled
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Ce workflow est désactivé. Voir le commentaire dans le fichier"
          echo "pour la procédure d'activation."
          exit 0

